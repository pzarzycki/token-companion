name: Build

# Manual trigger only for now (no remote / release automation yet).
# Also runs on version tags (v*) so pushing a tag produces a draft release.
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Collect artifacts into a draft GitHub release"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifact: macos
          - os: windows-latest
            script: build:win
            artifact: windows
          - os: ubuntu-latest
            script: build:linux
            artifact: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # classic-level is a native module — it's compiled from source on install
      # for whichever runner we're on. No cross-compilation; each OS builds its own.
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # Don't attempt code signing / notarization in CI (see notes below).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-companion-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Draft release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/**/*
          generate_release_notes: true
