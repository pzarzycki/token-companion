name: Release

# Version tags on main are the release source of truth.
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Build artifacts, publish GitHub release, and publish npm package"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact: macos
          - os: windows-latest
            script: dist:win
            artifact: windows
          - os: ubuntu-latest
            script: dist:linux
            artifact: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      # classic-level is a native module — it's compiled from source on install
      # for whichever runner we're on. No cross-compilation; each OS builds its own.
      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/verify-release-version.mjs "${{ github.ref }}"

      - name: Validate source installer
        run: npm run install:dry-run

      - name: Validate POSIX installer syntax
        if: runner.os != 'Windows'
        run: sh -n install.sh

      - name: Validate PowerShell installer help
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\install.ps1 -Help

      - name: Prepare Windows signing certificate
        if: runner.os == 'Windows' && secrets.WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}'))
          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-companion-${{ matrix.artifact }}
          path: out/dist/**/*
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/verify-release-version.mjs "${{ github.ref }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: find dist -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: dist/**/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: node scripts/verify-release-version.mjs "${{ github.ref }}" "packages/npm-installer/package.json"

      - name: Install npm package dependencies
        run: npm ci
        working-directory: packages/npm-installer

      - name: Publish package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "token-companion@$VERSION" version >/dev/null 2>&1; then
            echo "token-companion@$VERSION already published; skipping npm publish"
            exit 0
          fi
          npm publish
        working-directory: packages/npm-installer
