site_name: Token Companion
site_url: https://OWNER.github.io/token-companion/
site_description: "A local, privacy-first desktop app that counts tokens and maps costs across Claude and Codex sessions."
repo_url: https://github.com/OWNER/token-companion
repo_name: OWNER/token-companion
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/icon.png
  favicon: assets/icon.png
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - header.autohide
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Installation:
    - macOS: installation/macos.md
    - Windows: installation/windows.md
    - Linux: installation/linux.md
  - Usage:
    - Getting Started: usage/getting-started.md
    - Features: usage/features.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OWNER/token-companion
      name: Token Companion on GitHub
